services:
  cr-backend:
    image: maven:3.9.6-eclipse-temurin-17
    working_dir: /app
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    ports:
      - "8081:8080"
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    command: mvn spring-boot:run
    networks:
      - my_network_cr

networks:
  my_network_cr:
    external: true
