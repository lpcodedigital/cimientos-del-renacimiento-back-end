# =========================================================
# 🔧 BASE CONFIGURATION (COMMON TO ALL PROFILES)
# =========================================================

# Nombre de la aplicación
spring.application.name=CimientosDelRenacimientoBackend

# Desactivar la bandera open-in-view (buena práctica para APIs REST)
spring.jpa.open-in-view=false

# =========================================================
# 🌍 ACTIVE PROFILE
# =========================================================
# Perfil activo por defecto. Cambia según tu necesidad:
# - dev     → debug local desde VS Code
# - staging → desarrollo en contenedores (entorno cotidiano)
# - prod    → despliegue en VPS o entorno real
spring.profiles.active=staging

# =========================================================
# 🧱 COMMON JPA CONFIGURATION
# =========================================================
# Formatear el SQL en todos los entornos
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# 🪵 LOGGING (nivel base)
# =========================================================
logging.level.root=INFO

# =========================================================
# ☁️ STORAGE PROVIDER
# Indica el proveedor de almacenamiento de imágenes
# (cloudflare, aws, local, etc.)
# =========================================================
storage.provider=${STORAGE_PROVIDER} 

# =========================================================
# ☁️ CLOUDFLARE IMAGE STORAGE CONFIGURATION
# =========================================================
cloudflare.account-id=${CLOUDFLARE_ACCOUNT_ID}
cloudflare.api-token=${CLOUDFLARE_API_TOKEN}
cloudflare.api-url=https://api.cloudflare.com/client/v4/accounts/
cloudflare.delivery-url=https://imagedelivery.net/